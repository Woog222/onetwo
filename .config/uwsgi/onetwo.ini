[uwsgi]
chdir = /root/onetwo/
module = myproject.wsgi:application
home = /root/onetwo/venv/

uid = root
gid = root

socket = /tmp/onetwo.sock
chmod-socket = 666
chown-socket = root:root

enable-threads = true
master = true
vacuum = true
pidfile = /tmp/onetwo.pid
logto = /var/log/uwsgi/onetwo/@(exec://date +%%Y-%%m-%%d).log
log-reopen = true